services:
  litellm:
    image: ghcr.io/berriai/litellm@sha256:9e1536c6a9219519f024f221706b20b012ca5176988164798adc5c7fe011e5d5
    container_name: gpthub-prod-litellm
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.mws.local
        required: false
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    networks:
      - gpthub-prod-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  orchestrator:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    container_name: gpthub-prod-orchestrator
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.mws.local
        required: false
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      # Same named volume as open-webui → read uploads from message.files[].file.path
      ORCHESTRATOR_OPEN_WEBUI_DATA_MOUNT: /mnt/open-webui-backend-data
      # Optional: POST /api/v1/chats/.../messages/.../event (set key + ORCHESTRATOR_WEBUI_STATUS_ENABLED in .env).
      ORCHESTRATOR_WEBUI_BASE_URL: http://gpthub-prod-open-webui:8080
    volumes:
      - open-webui-data:/mnt/open-webui-backend-data:ro
    ports:
      - "8089:8000"
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - gpthub-prod-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  embedding-shim:
    profiles:
      - rag
    build:
      context: ..
      dockerfile: apps/embedding_shim/Dockerfile
    container_name: gpthub-prod-embedding-shim
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.mws.local
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gpthub-prod-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  open-webui:
    # ${OPEN_WEBUI_IMAGE}: для подстановки передавайте корневой .env через make / docker compose --env-file (см. Makefile DOCKER_COMPOSE_INFRA)
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.8.12}
    container_name: gpthub-prod-open-webui
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.mws.local
        required: false
    environment:
      OPENAI_API_BASE_URL: http://orchestrator:8000/v1
      # Forward X-OpenWebUI-Chat-Id / X-OpenWebUI-Message-Id to orchestrator (status bridge).
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_OPENAI_API_BASE_URL: ${MWS_GPT_API_BASE:-https://api.gpt.mws.ru/v1}
      AUDIO_STT_OPENAI_API_KEY: ${MWS_GPT_API_KEY}
      AUDIO_STT_MODEL: ${ORCHESTRATOR_ASR_MODEL:-whisper-medium}
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    networks:
      - gpthub-prod-net

networks:
  gpthub-prod-net:
    driver: bridge

volumes:
  open-webui-data:
